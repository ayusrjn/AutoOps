services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite:////app/data/autoops.db
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://host.docker.internal:9090}
      - LOKI_URL=${LOKI_URL:-http://host.docker.internal:3100}
      - JAEGER_URL=${JAEGER_URL:-http://host.docker.internal:16686}
      - LITELLM_MODEL=${LITELLM_MODEL:-gemini/gemini-2.5-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - backend-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
